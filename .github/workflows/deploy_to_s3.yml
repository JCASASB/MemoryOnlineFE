name: Deploy to S3
on:
  push:
    branches:
      - main # Se dispara al hacer push a la rama principal

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Debug AWS Secrets Presence
        run: |
          echo "AWS_ACCESS_KEY_ID is ${AWS_ACCESS_KEY_ID:+set}"
          echo "AWS_SECRET_ACCESS_KEY is ${AWS_SECRET_ACCESS_KEY:+set}"
          echo "AWS_REGION is ${AWS_REGION:+set}"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Configura el entorno de Node (si es necesario construir la app)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3. Instala dependencias y genera los archivos de producción
      - name: Install and Build
        run: |
          npm install
          npm run build  # Esto genera la carpeta /dist o /build

      # 4. Configura las credenciales de AWS
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 5a. Sincroniza assets estáticos con cache largo (inmutable por hash)
      - name: Deploy assets to S3 (long cache)
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          BUCKET=$(echo "$BUCKET" | tr -d '[:space:]')
          aws s3 sync ./dist "s3://${BUCKET}/memory" --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      # 5b. Sube index.html sin cache para que CloudFront siempre sirva la versión más reciente
      - name: Deploy index.html to S3 (no-cache)
        env:
          BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          BUCKET=$(echo "$BUCKET" | tr -d '[:space:]')
          aws s3 cp ./dist/index.html "s3://${BUCKET}/memory/index.html" \
            --cache-control "no-cache, no-store, max-age=0, must-revalidate"
